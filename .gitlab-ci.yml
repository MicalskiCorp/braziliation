# CI GitLab — testes .NET (sem Unity no runner)
# Caminho preferencial atual: Tests/Braziliation.Game.Tests/

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"

stages:
  - test

dotnet-test:
  image: mcr.microsoft.com/dotnet/sdk:8.0
  stage: test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - cd "$CI_PROJECT_DIR"
    - pwd
    - |
      set -euo pipefail
      CANDIDATES=(
        "dotnet-tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj"
        "Tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj"
        "tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj"
      )
      FOUND=""
      for p in "${CANDIDATES[@]}"; do
        if [[ -f "$p" ]]; then
          FOUND="$p"
          break
        fi
      done
      if [[ -z "$FOUND" ]]; then
        mapfile -t hits < <(find . -name 'Braziliation.Game.Tests.csproj' -type f ! -path './.git/*' 2>/dev/null || true)
        if [[ ${#hits[@]} -gt 0 ]]; then
          FOUND="${hits[0]#./}"
        fi
      fi
      if [[ -z "$FOUND" ]] || [[ ! -f "$FOUND" ]]; then
        echo "ERRO: Braziliation.Game.Tests.csproj não encontrado — commit Tests/Braziliation.Game.Tests/"
        ls -la
        ls -la dotnet-tests 2>/dev/null || true
        ls -la Tests 2>/dev/null || true
        exit 1
      fi
      export TEST_PROJECT="$FOUND"
      echo "Using: $TEST_PROJECT"
    - test -f "ProjectSettings/ProjectVersion.txt" || echo "Aviso: layout Unity não detetado (opcional para estes testes)."
  script:
    - dotnet restore "$TEST_PROJECT"
    - dotnet build "$TEST_PROJECT" --configuration Release --no-restore
    - dotnet test "$TEST_PROJECT" --configuration Release --no-build --verbosity normal

name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Detect Unity project layout
        id: unity
        run: |
          if [ -f "ProjectSettings/ProjectVersion.txt" ]; then
            echo "unity=true" >> $GITHUB_OUTPUT
          else
            echo "unity=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve test project path (Linux is case-sensitive)
        run: |
          if [ -f "Tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj" ]; then
            echo "TEST_PROJECT=Tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj" >> "$GITHUB_ENV"
            echo "Using Tests/ (expected on Linux CI)."
          elif [ -f "tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj" ]; then
            echo "TEST_PROJECT=tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj" >> "$GITHUB_ENV"
            echo "Using tests/ (legacy path)."
          else
            echo "::error::Missing Braziliation.Game.Tests.csproj under Tests/ or tests/ — commit the folder from repo root."
            ls -la
            exit 1
          fi

      - name: Restore, build and test (.NET tests project)
        run: |
          dotnet restore "$TEST_PROJECT"
          dotnet build "$TEST_PROJECT" --configuration Release --no-restore
          dotnet test "$TEST_PROJECT" --configuration Release --no-build --verbosity normal

      - name: Post-check
        run: |
          if [ "${{ steps.unity.outputs.unity }}" = "true" ]; then
            echo "Unity project detected — gameplay C# builds in the Unity Editor; CI validated repository layout and .NET tests."
          else
            echo "ProjectSettings/ProjectVersion.txt not found — .NET tests ran against the current tree."
          fi
          echo "CI completed."

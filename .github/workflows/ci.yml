name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Detect Unity project layout
        id: unity
        run: |
          if [ -f "ProjectSettings/ProjectVersion.txt" ]; then
            echo "unity=true" >> $GITHUB_OUTPUT
          else
            echo "unity=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify test project exists
        run: |
          TEST_PROJECT="tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj"
          if [ ! -f "$TEST_PROJECT" ]; then
            echo "::error::Missing $TEST_PROJECT — commit the tests/ folder (see repo root)."
            ls -la
            exit 1
          fi

      - name: Restore, build and test (.NET tests project)
        # Usa o .csproj diretamente para não depender de Braziliation.CI.sln no clone (evita MSB1009 se a .sln não foi commitada).
        run: |
          dotnet restore tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj
          dotnet build tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj --configuration Release --no-restore
          dotnet test tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Post-check
        run: |
          if [ "${{ steps.unity.outputs.unity }}" = "true" ]; then
            echo "Unity project detected — gameplay C# builds in the Unity Editor; CI validated repository layout and .NET tests."
          else
            echo "ProjectSettings/ProjectVersion.txt not found — .NET tests ran against the current tree."
          fi
          echo "CI completed."

name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Detect Unity project layout
        id: unity
        run: |
          if [ -f "Desenvolvimento/ProjectSettings/ProjectVersion.txt" ]; then
            echo "unity=true" >> $GITHUB_OUTPUT
          else
            echo "unity=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve test project (.csproj)
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          # Ordem preferencial + compatibilidade com layouts antigos
          CANDIDATES=(
            "Desenvolvimento/dotnet-tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj"
            "Desenvolvimento/Tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj"
            "Desenvolvimento/tests/Braziliation.Game.Tests/Braziliation.Game.Tests.csproj"
          )
          FOUND=""
          for p in "${CANDIDATES[@]}"; do
            if [[ -f "$p" ]]; then
              FOUND="$p"
              break
            fi
          done
          if [[ -z "$FOUND" ]]; then
            mapfile -t hits < <(find . -name 'Braziliation.Game.Tests.csproj' -type f ! -path './.git/*' 2>/dev/null || true)
            if [[ ${#hits[@]} -gt 0 ]]; then
              FOUND="${hits[0]#./}"
            fi
          fi
          if [[ -z "$FOUND" ]] || [[ ! -f "$FOUND" ]]; then
            echo "::error::Braziliation.Game.Tests.csproj não encontrado. Verifique o commit de Tests/Braziliation.Game.Tests/ (ver README)."
            echo "--- ls -la (raiz) ---"
            ls -la
            echo "--- Desenvolvimento/dotnet-tests/ ---"
            ls -la Desenvolvimento/dotnet-tests 2>/dev/null || echo "(ausente)"
            echo "--- Desenvolvimento/Tests/ ---"
            ls -la Desenvolvimento/Tests 2>/dev/null || echo "(ausente)"
            echo "--- find *Game.Tests*.csproj ---"
            find . -name '*.Game.Tests.csproj' -type f ! -path './.git/*' 2>/dev/null || true
            exit 1
          fi
          echo "TEST_PROJECT=$FOUND" >> "$GITHUB_ENV"
          echo "Using test project: $FOUND"

      - name: Restore, build and test (.NET tests project)
        run: |
          dotnet restore "$TEST_PROJECT"
          dotnet build "$TEST_PROJECT" --configuration Release --no-restore
          dotnet test "$TEST_PROJECT" --configuration Release --no-build --verbosity normal

      - name: Post-check
        run: |
          if [ "${{ steps.unity.outputs.unity }}" = "true" ]; then
            echo "Unity project detected — gameplay C# builds in the Unity Editor; CI validated repository layout and .NET tests."
          else
            echo "ProjectSettings/ProjectVersion.txt not found — .NET tests ran against the current tree."
          fi
          echo "CI completed."

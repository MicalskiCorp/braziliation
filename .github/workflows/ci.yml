name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Detect Unity project layout
        id: unity
        run: |
          if [ -f "ProjectSettings/ProjectVersion.txt" ]; then
            echo "unity=true" >> $GITHUB_OUTPUT
          else
            echo "unity=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore, build and test (Braziliation.CI.sln)
        run: |
          dotnet restore Braziliation.CI.sln
          dotnet build Braziliation.CI.sln --configuration Release --no-restore
          dotnet test Braziliation.CI.sln --configuration Release --no-build --verbosity normal

      - name: Post-check
        run: |
          if [ "${{ steps.unity.outputs.unity }}" = "true" ]; then
            echo "Unity project detected — gameplay C# builds in the Unity Editor; CI validated repository layout and .NET tests."
          else
            echo "ProjectSettings/ProjectVersion.txt not found — .NET tests ran against the current tree."
          fi
          echo "CI completed."
